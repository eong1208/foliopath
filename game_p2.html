<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio Path - 파트 2 왕자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="https://webfontbox.github.io/Arita/font.css">
  <link rel="stylesheet" type="text/css" href="https://webfontbox.github.io/Arita/font.min.css">

  <style>

    /* ══════════════════════════════
       기본 설정
    ══════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #e8dfc8;
      font-family: 'MaruBuri', serif;
      position: relative;
      cursor: default;
    }

    /* ══════════════════════════════
       배경 레이어
    ══════════════════════════════ */
    #bg-parchment {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #bg-illust {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #bg-illust.reveal { opacity: 1; }

    /* ══════════════════════════════
       씬 컨테이너
    ══════════════════════════════ */
    #scene {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══════════════════════════════
       좌상단 홈 버튼
    ══════════════════════════════ */
    #btn-home {
      position: absolute;
      top: 2%;
      left: 2%;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 4px;
      transition: filter 0.15s;
    }
    #btn-home:hover {
      filter: invert(19%) sepia(28%) saturate(800%) hue-rotate(345deg) brightness(90%) contrast(95%);
    }
    #btn-home img { width: 28px; height: auto; display: block; }

    /* ══════════════════════════════
       우상단 설정 버튼
    ══════════════════════════════ */
    #btn-setting {
      position: absolute;
      top: 2%;
      right: 2%;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 4px;
      transition: filter 0.15s;
    }
    #btn-setting:hover {
      filter: invert(19%) sepia(28%) saturate(800%) hue-rotate(345deg) brightness(90%) contrast(95%);
    }
    #btn-setting img { width: 28px; height: auto; display: block; }

    /* ══════════════════════════════
       씬 이미지
    ══════════════════════════════ */
    #scene-img-wrap {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: 48%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #scene-img-wrap.reveal { opacity: 1; }

    #scene-img {
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      position: absolute;
      display: block;
    }

    /* ══════════════════════════════
       본문 텍스트 영역
    ══════════════════════════════ */
    #script-area {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-height: 25vh;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.8s ease;

      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    #script-area::-webkit-scrollbar {
      width: 6px;
      background: transparent;
    }
    #script-area::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    #script-area:hover::-webkit-scrollbar-thumb,
    #script-area:active::-webkit-scrollbar-thumb {
      background: rgba(180, 154, 80, 0.35);
    }
    #script-area:hover {
      scrollbar-color: rgba(180, 154, 80, 0.35) transparent;
    }
    #script-area.reveal { opacity: 1; }

    #script-text {
      font-family: 'MaruBuri', serif;
      font-size: 1rem;
      color: #2a1e08;
      line-height: 1.95;
      word-break: keep-all;
      padding-left: 5%;
    }

    /* 타이핑 커서 */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ══════════════════════════════
       선택지 카드 영역
    ══════════════════════════════ */
    #choices-wrap {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 62%;
      height: 12%;
      display: flex;
      gap: 2%;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #choices-wrap.reveal {
      opacity: 1;
      pointer-events: auto;
    }
    #choices-wrap.hidden {
      opacity: 0 !important;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    .choice-card {
      flex: 1;
      background-image: url('images/btn_choice.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-color: transparent;
      border: none;
      padding: 16px 18px 16px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      transition: filter 0.18s ease, transform 0.18s ease;
      min-height: 80px;
    }
    .choice-card:hover { filter: brightness(0.92); transform: translateY(-2px); }
    .choice-card:active { transform: translateY(0); }

    .choice-icon { width: 50px; flex-shrink: 0; }

    .choice-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .choice-label {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: #9a8060;
      margin-bottom: 8%;
    }

    .choice-body {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      color: #2a1e08;
      line-height: 1.4;
    }

    .choice-arrow {
      font-size: 1rem;
      color: #9a8060;
      flex-shrink: 0;
      margin-right: 2%;
    }

    /* ══════════════════════════════
       하단 안내 문구
    ══════════════════════════════ */
    #next-hint {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.7rem;
      color: #9a8060;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.6s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    #next-hint.visible { opacity: 1; }

    /* ══════════════════════════════
       씬 전환: 텍스트/선택지 영역만 페이드
    ══════════════════════════════ */
    /* 일반 씬 전환 — 검은 화면 없이 텍스트+선택지만 스르륵 */
    #script-area.scene-out  { opacity: 0; transition: opacity 0.3s ease; }
    #script-area.scene-in   { opacity: 0; }
    #script-area.scene-in.reveal { opacity: 1; transition: opacity 0.5s ease 0.1s; }

    #choices-wrap.scene-out { opacity: 0 !important; transition: opacity 0.2s ease; }

    /* 엔딩 전환용 검은 overlay (엔딩 진입 시에만 사용) */
    #ending-transition {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #ending-transition.fade-in  { opacity: 1;  pointer-events: auto; }
    #ending-transition.fade-out { opacity: 0;  pointer-events: none; }

    /* ══════════════════════════════
       인트로 오버레이
    ══════════════════════════════ */
    #intro-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #intro-overlay.fade-out {
      animation: introFadeOut 1.6s ease forwards;
    }
    @keyframes introFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    .intro-line {
      opacity: 0;
      color: #c8b98a;
      text-align: center;
      animation: introFadeIn 1s ease forwards;
    }
    @keyframes introFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #intro-tale {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: #8a7450;
      animation-delay: 0.3s;
      margin-bottom: 10px;
    }
    #intro-part {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      color: #8a7450;
      animation-delay: 0.3s;
      margin-bottom: 28px;
    }
    #intro-title {
      font-family: 'Aritaburi', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #e8d9b0;
      animation-delay: 0.6s;
      margin-bottom: 16px;
    }
    #intro-quote {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      color: #a09070;
      animation-delay: 1s;
      margin-bottom: 24px;
    }
    #intro-divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, #6a5830, transparent);
      margin-bottom: 20px;
      opacity: 0;
      animation: introFadeIn 1s ease 1.3s forwards;
    }
    #intro-player {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: #7a6a4a;
      animation-delay: 1.5s;
    }

    /* ══════════════════════════════
       씬 이미지 등장 애니메이션
    ══════════════════════════════ */
    #scene-img-wrap.reveal {
      animation: sceneReveal 1.8s ease forwards;
    }
    @keyframes sceneReveal {
      0%   { opacity: 0; filter: blur(12px) brightness(0.4); transform: translateX(-50%) scale(1.04); }
      60%  { filter: blur(2px) brightness(0.85); }
      100% { opacity: 1; filter: blur(0) brightness(1); transform: translateX(-50%) scale(1); }
    }

    /* ══════════════════════════════
       ★ 엔딩 화면
    ══════════════════════════════ */
    #ending-screen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 3% 0 4%;
    }
    #ending-screen.active { display: flex; }

    /* 엔딩 넘버 라벨 */
    .ending-number {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      color: #9a7d40;
      margin-top: 2%;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ending-number::before,
    .ending-number::after {
      content: '✦';
      font-size: 0.55rem;
      color: #b89a50;
    }

    /* 엔딩 제목 */
    .ending-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: #2a1e08;
      margin-bottom: 18px;
      text-align: center;
    }

    /* 조개 라인 장식 */
    .ending-arch-line {
      width: 38%;
      margin-bottom: 22px;
    }

    /* 엔딩 일러스트 */
    .ending-illust {
      width: 38%;
      max-width: 560px;
      border-radius: 2px;
      margin-bottom: 26px;
    }

    /* 엔딩 본문 텍스트 박스 */
    .ending-text-box {
      width: 52%;
      max-width: 720px;
      max-height: 28vh;
      position: relative;
      padding: 28px 36px;
      margin-bottom: 28px;
      overflow-y: auto;

      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    .ending-text-box::-webkit-scrollbar {
      width: 6px;
      background: transparent;
    }
    .ending-text-box::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    .ending-text-box:hover::-webkit-scrollbar-thumb,
    .ending-text-box:active::-webkit-scrollbar-thumb {
      background: rgba(180, 154, 80, 0.35);
    }
    .ending-text-box:hover {
      scrollbar-color: rgba(180, 154, 80, 0.35) transparent;
    }

    /* 모서리 장식선 */
    .ending-text-box::before,
    .ending-text-box::after {
      content: '';
      position: absolute;
      border-color: #b89a50;
      border-style: solid;
      width: 18px;
      height: 18px;
    }
    .ending-text-box::before {
      top: 8px; left: 8px;
      border-width: 1px 0 0 1px;
    }
    .ending-text-box::after {
      bottom: 8px; right: 8px;
      border-width: 0 1px 1px 0;
    }

    /* 내부 추가 장식 (top-right, bottom-left) */
    .ending-text-box .corner-tr,
    .ending-text-box .corner-bl {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: #b89a50;
      border-style: solid;
    }
    .ending-text-box .corner-tr {
      top: 8px; right: 8px;
      border-width: 1px 1px 0 0;
    }
    .ending-text-box .corner-bl {
      bottom: 8px; left: 8px;
      border-width: 0 0 1px 1px;
    }

    .ending-text-paragraph {
      font-family: 'MaruBuri', serif;
      font-size: 0.92rem;
      color: #2a1e08;
      line-height: 2;
      text-align: center;
      word-break: keep-all;
      margin-bottom: 16px;
    }
    .ending-text-paragraph:last-child { margin-bottom: 0; }

    /* 엔딩명 입력 영역 */
    .ending-name-wrap {
      width: 52%;
      max-width: 720px;
      display: flex;
      align-items: stretch;
      gap: 0;
      border: 1px solid #c4a96a;
      border-radius: 2px;
      overflow: hidden;
      background: rgba(248, 242, 228, 0.6);
    }

    .ending-name-label {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.65rem;
      color: #9a8060;
      letter-spacing: 0.1em;
      padding: 10px 14px 0;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex-shrink: 0;
    }

    .ending-name-input-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 14px 10px 0;
    }

    .ending-name-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.92rem;
      color: #2a1e08;
      width: 100%;
      padding: 4px 0;
    }
    .ending-name-input::placeholder { color: #b8a888; }

    .ending-name-btn {
      background: #2a1e08;
      border: none;
      color: #c8b070;
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      padding: 0 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .ending-name-btn:hover { background: #3d2e12; }

    /* ══════════════════════════════
       모바일 반응형
    ══════════════════════════════ */
    @media (max-width: 768px) {
      #scene-img-wrap { width: 88%; top: 3%; }
      #script-area    { width: 88%; top: 50%; }
      #choices-wrap   { width: 94%; flex-direction: column; gap: 2%; bottom: 3%; height: auto; }
      #script-text    { font-size: 0.82rem; }

      .ending-title       { font-size: 1.8rem; }
      .ending-arch-line   { width: 80%; }
      .ending-illust      { width: 85%; }
      .ending-text-box    { width: 88%; padding: 20px 22px; }
      .ending-name-wrap   { width: 88%; }
    }


    /* ══════════════════════════════
       파트 완료 오버레이
    ══════════════════════════════ */
    #part-end-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 6, 0, 0.78);
      z-index: 300;
      justify-content: center;
      align-items: center;
      animation: partEndBgIn 0.8s ease both;
    }
    #part-end-overlay.active { display: flex; }

    @keyframes partEndBgIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #part-end-box {
      position: relative;
      width: min(560px, 84vw);
      max-height: 80vh;
      background: #f5eedd;
      border: 1px solid #c4a86a;
      border-radius: 3px;
      padding: 52px 52px 44px;
      text-align: center;
      animation: partEndBoxIn 0.7s cubic-bezier(0.34,1.3,0.64,1) 0.15s both;
      display: flex;
      flex-direction: column;
    }

    #part-end-text-area {
      overflow-y: auto;
      max-height: 50vh;
      margin-bottom: 24px;

      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    #part-end-text-area::-webkit-scrollbar {
      width: 6px;
      background: transparent;
    }
    #part-end-text-area::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    #part-end-text-area:hover::-webkit-scrollbar-thumb,
    #part-end-text-area:active::-webkit-scrollbar-thumb {
      background: rgba(180, 154, 80, 0.35);
    }
    #part-end-text-area:hover {
      scrollbar-color: rgba(180, 154, 80, 0.35) transparent;
    }

    @keyframes partEndBoxIn {
      from { opacity: 0; transform: scale(0.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 네 모서리 장식 */
    #part-end-box::before,
    #part-end-box::after,
    #part-end-box .corner-tr,
    #part-end-box .corner-bl {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: #b89a50;
      border-style: solid;
    }
    #part-end-box::before  { top:10px; left:10px;   border-width:1px 0 0 1px; }
    #part-end-box::after   { bottom:10px; right:10px; border-width:0 1px 1px 0; }
    #part-end-box .corner-tr { top:10px; right:10px;  border-width:1px 1px 0 0; }
    #part-end-box .corner-bl { bottom:10px; left:10px; border-width:0 0 1px 1px; }

    .part-end-label {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      color: #9a7d40;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 18px;
    }
    .part-end-label::before,
    .part-end-label::after { content: '✦'; font-size: 0.5rem; color: #c4a050; }

    #part-end-summary {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.92rem;
      color: #3a2800;
      line-height: 2;
      margin-bottom: 16px;
      word-break: keep-all;
    }
    #part-end-summary em {
      font-style: normal;
      color: #7a5a18;
      font-weight: 700;
    }

    #part-end-notice {
      font-family: 'MaruBuri', serif;
      font-size: 0.78rem;
      color: #9a8060;
      line-height: 1.85;
      margin-bottom: 0;
      word-break: keep-all;
    }

    .part-end-complete-btn {
      display: block;
      width: 100%;
      padding: 13px 24px;
      background: #2a1e08;
      border: 1px solid #c4a96a;
      border-radius: 2px;
      color: #e8d8a0;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.2s ease, filter 0.2s ease;
    }
    .part-end-complete-btn:hover {
      background: #3a2e18;
      filter: brightness(1.15);
    }
    .part-end-complete-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }


    /* ══════════════════════════════
       설정 오버레이 (공통)
    ══════════════════════════════ */
    .overlay-panel {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .overlay-box {
      background: #f5ead0;
      border: 3px solid #8b6914;
      border-radius: 12px;
      padding: 32px 28px;
      min-width: 300px;
      text-align: center;
      font-family: 'Nanum Myeongjo', serif;
      color: #3a2a00;
      position: relative;
    }

    .overlay-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #8b6914;
    }

    .overlay-box h2 { margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- 배경 -->

<!-- ════════════════════════════════════════════════════
     공통 사운드 & 설정 엔진
════════════════════════════════════════════════════ -->
<script>
/* ════════════════════════════════════════════════════
   공통 사운드 & 설정 엔진
   - 모든 페이지(index, library, archive, game_p1~3)에
     동일하게 삽입한다.
   - localStorage로 설정값을 공유하고,
     배경음 재생 위치를 이어받아 끊김을 최소화한다.
════════════════════════════════════════════════════ */

/* ── 설정값 불러오기 (없으면 기본값) ── */
function getSetting(key, def) {
  var v = localStorage.getItem(key);
  return (v === null) ? def : v;
}

var SETTINGS = {
  bgmVolume: parseInt(getSetting('folio_bgmVolume', '35'), 10),   // 0~100
  clickEnabled: getSetting('folio_clickEnabled', 'on') === 'on',  // on/off
  textSpeed: getSetting('folio_textSpeed', 'normal'),             // slow/normal/fast
};

/* 텍스트 출력 속도 → 1글자당 ms (typeAppend 등에서 사용) */
var TEXT_SPEED_MS = { slow: 65, normal: 40, fast: 18 };
function getTypeSpeed() {
  return TEXT_SPEED_MS[SETTINGS.textSpeed] || TEXT_SPEED_MS.normal;
}

/* ── 사운드 엘리먼트 ── */
var bgm      = document.getElementById('bgm');
var sfxClick = document.getElementById('sfx-click');
var bgmStarted = false;

/* 배경음 시작 + 이어듣기 위치 복원 */
function startBgm() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.volume = SETTINGS.bgmVolume / 100;

  var savedTime = parseFloat(sessionStorage.getItem('folio_bgmTime') || '0');
  if (savedTime > 0 && isFinite(savedTime)) {
    bgm.currentTime = savedTime;
  }
  bgm.play().catch(function(){});
}

/* 클릭음 재생 (설정에서 꺼져있으면 재생 안 함) */
function playClick() {
  if (!SETTINGS.clickEnabled) return;
  sfxClick.currentTime = 0;
  sfxClick.play().catch(function(){});
}

/* 첫 클릭 시 배경음 시작 + 매 클릭마다 클릭음 재생 */
document.addEventListener('click', function() {
  startBgm();
  playClick();
}, true);

/* 1초마다 배경음 재생 위치를 저장 (다음 페이지에서 이어 듣기 위함) */
setInterval(function() {
  if (bgm && !bgm.paused) {
    sessionStorage.setItem('folio_bgmTime', String(bgm.currentTime));
  }
}, 1000);

/* 페이지를 벗어나기 직전에도 한 번 더 저장 */
window.addEventListener('pagehide', function() {
  if (bgm) {
    sessionStorage.setItem('folio_bgmTime', String(bgm.currentTime));
  }
});


/* ════════════════════════════════════════════════════
   설정 오버레이 — 공통 UI
════════════════════════════════════════════════════ */
function openOverlay(id) {
  var el = document.getElementById(id);
  el.classList.add('active');
  el.style.display = 'flex';

  if (id === 'overlay-setting') {
    syncSettingUI();
  }
}

function closeOverlay(id) {
  var el = document.getElementById(id);
  el.classList.remove('active');
  el.style.display = 'none';
}

/* 오버레이 바깥 클릭하면 닫히게 (.overlay, .overlay-panel 둘 다 지원) */
document.querySelectorAll('.overlay, .overlay-panel').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      closeOverlay(overlay.id);
    }
  });
});

/* 설정창 UI를 현재 SETTINGS 값으로 동기화 */
function syncSettingUI() {
  var volSlider = document.getElementById('setting-bgm-volume');
  var volLabel  = document.getElementById('setting-bgm-volume-label');
  var clickToggle = document.getElementById('setting-click-toggle');
  var speedRadios = document.querySelectorAll('input[name="setting-text-speed"]');

  if (volSlider) {
    volSlider.value = SETTINGS.bgmVolume;
    if (volLabel) volLabel.textContent = SETTINGS.bgmVolume + '%';
  }
  if (clickToggle) {
    clickToggle.checked = SETTINGS.clickEnabled;
  }
  speedRadios.forEach(function(radio) {
    radio.checked = (radio.value === SETTINGS.textSpeed);
  });
}

/* 배경음 크기 변경 */
function onBgmVolumeChange(value) {
  SETTINGS.bgmVolume = parseInt(value, 10);
  localStorage.setItem('folio_bgmVolume', String(SETTINGS.bgmVolume));
  bgm.volume = SETTINGS.bgmVolume / 100;
  var volLabel = document.getElementById('setting-bgm-volume-label');
  if (volLabel) volLabel.textContent = SETTINGS.bgmVolume + '%';
}

/* 클릭음 on/off 변경 */
function onClickToggleChange(checked) {
  SETTINGS.clickEnabled = checked;
  localStorage.setItem('folio_clickEnabled', checked ? 'on' : 'off');
}

/* 텍스트 속도 변경 */
function onTextSpeedChange(value) {
  SETTINGS.textSpeed = value;
  localStorage.setItem('folio_textSpeed', value);
}
</script>

/* 씬 1-X 분기: 조개 껍데기 플래그 있으면 엔딩5 루트 */
function goTo1X() {
  var savedFlags = JSON.parse(sessionStorage.getItem('flags') || '{}');
  if (savedFlags.shellGiven) {
    loadScene('s1X');
  } else {
    loadScene('s1c');
  }
}

/* 씬 16-X 분기: 해피엔딩 선택지 횟수 4 이상이면 16-X */
function goTo16X() {
  var savedFlags = JSON.parse(sessionStorage.getItem('flags') || '{}');
  var happyCount = savedFlags.happyCount || 0;
  if (happyCount >= 4) {
    loadScene('s16X');
  } else {
    p2end();
  }
}

/* P2 완료 → 파트 완료 오버레이 */
function p2end() {
  var savedFlags = JSON.parse(sessionStorage.getItem('flags') || '{}');
  var summary = '왕자는 소녀를 곁에 두고 이웃 나라로의 여행을 마쳤습니다.';
  if (savedFlags.shellGiven) {
    summary = '조개 껍데기의 비밀을 품은 채 여행을 마친 왕자는, 언젠가 그 기억이 되살아오리라 믿었습니다.';
  }
  showPartEnd(2, summary, 'library.html');
}



/* ════════════════════════════════════════════════════
   파트 완료 처리
   - 현재 방을 cleared로 변경 + 최종 수치/플래그 저장
   - 같은 lineage_id로 다음 파트 방을 새로 생성(waiting)
════════════════════════════════════════════════════ */
async function showPartEnd(partNum, choiceSummary, nextHref) {
  endingReached = true;
  if (heartbeatTimer) clearInterval(heartbeatTimer);

  sessionStorage.setItem('stats', JSON.stringify(stats));
  sessionStorage.setItem('flags', JSON.stringify(flags));

  partEndNextHref = nextHref || 'library.html';

  document.getElementById('part-end-label').textContent = 'PART ' + partNum + ' — END';
  document.getElementById('part-end-summary').innerHTML = choiceSummary;
  document.getElementById('part-end-notice').innerHTML =
    '파트 ' + partNum + '이 마무리되었습니다.<br>' +
    '당신의 이야기와 선택의 결과는 다음 플레이어에게 계승됩니다.<br>' +
    '완료 버튼을 눌러 이야기 선택창으로 나갈 수 있습니다.';

  document.getElementById('part-end-overlay').classList.add('active');
  window.onbeforeunload = null;

  var btn = document.getElementById('btn-part-end-complete');
  btn.disabled = true;
  btn.innerHTML = '✦ &nbsp;기록하는 중...&nbsp; ✦';

  try {
    if (ROOM_ID) {
      await db.from('rooms')
        .update({
          status: 'cleared',
          stats_a: stats.A,
          stats_b: stats.B,
          stats_c: stats.C,
          stats_d: stats.D,
          stats_count: stats.count,
          flags: flags
        })
        .eq('id', ROOM_ID);
    }

    if (LINEAGE_ID && partNum < 3) {
      await db.from('rooms').insert({
        lineage_id: LINEAGE_ID,
        part: partNum + 1,
        status: 'waiting',
        stats_a: stats.A,
        stats_b: stats.B,
        stats_c: stats.C,
        stats_d: stats.D,
        stats_count: stats.count,
        flags: flags
      });
    }
  } catch (err) {
    console.error('파트 완료 DB 처리 실패:', err);
  }

  btn.disabled = false;
  btn.innerHTML = '✦ &nbsp;완료&nbsp; ✦';
}

/* 파트 완료 화면의 "완료" 버튼 클릭 → library.html로 이동 */
function goToLibraryFromPartEnd() {
  location.href = partEndNextHref || 'library.html';
}

/* ════════════════════════════════════════════════════
   씬 로더
════════════════════════════════════════════════════ */
var currentScene = null;
var typingTimer = null;
var typingDone = false;
var waitingForNext = false;
var nextTarget = null;

function loadScene(sceneId) {
  currentScene = sceneId;
  typingDone = false;
  waitingForNext = false;
  nextTarget = null;

  var scene = SCENES[sceneId];
  if (!scene) { console.warn('씬 없음:', sceneId); return; }

  /* onEnter 콜백 (플래그 설정 등) */
  if (scene.onEnter) scene.onEnter();

  /* 이미지 교체 */
  var imgEl = document.getElementById('scene-img');
  if (imgEl.getAttribute('data-src') !== scene.img) {
    imgEl.setAttribute('data-src', scene.img);
    imgEl.src = 'images/' + scene.img;
  }

  /* 선택지 초기화 */
  var choicesWrap = document.getElementById('choices-wrap');
  choicesWrap.innerHTML = '';
  choicesWrap.classList.remove('reveal', 'hidden');

  /* 안내문구 숨기기 */
  document.getElementById('next-hint').classList.remove('visible');

  /* 본문 타이핑 시작 */
  startTyping(scene.lines, function() {
    typingDone = true;
    if (scene.choices && scene.choices.length > 0) {
      /* 선택지 렌더링 */
      renderChoices(scene.choices);
      setTimeout(function() {
        choicesWrap.classList.add('reveal');
      }, 300);
    } else {
      /* 선택지 없으면 "클릭해서 다음으로" */
      var nxt = scene.next;
      nextTarget = nxt;
      document.getElementById('next-hint').classList.add('visible');
      waitingForNext = true;
    }
  });
}

/* 선택지 렌더 */
var ICON_LABELS = ['A', 'B', 'C', 'D'];
function renderChoices(choices) {
  var wrap = document.getElementById('choices-wrap');
  wrap.innerHTML = '';
  choices.forEach(function(ch, idx) {
    var btn = document.createElement('button');
    btn.className = 'choice-card';
    btn.innerHTML =
      '<img class="choice-icon" src="images/icon_choice_' + ICON_LABELS[idx].toLowerCase() + '.png" alt="" />' +
      '<div class="choice-text-wrap">' +
        '<span class="choice-label">선택 ' + ICON_LABELS[idx] + '</span>' +
        '<span class="choice-body">' + ch.body + '</span>' +
      '</div>' +
      '<span class="choice-arrow">→</span>';
    btn.addEventListener('click', function() { onChoiceSelect(ch, idx); });
    wrap.appendChild(btn);
  });
}

/* 선택지 클릭 처리 */
/* ════════════════════════════════════════════════════
   다음 대상으로 이동하는 공통 헬퍼
════════════════════════════════════════════════════ */
function goToNext(target) {
  if (typeof target === 'function') {
    target();
  } else if (typeof target === 'string' && !SCENES[target] && typeof window[target] === 'function') {
    window[target]();
  } else if (target) {
    doSceneTransition(target);
  }
}

function onChoiceSelect(choice, idx) {
  /* 수치 추가 */
  if (choice.stats) addStats(choice.stats[0], choice.stats[1], choice.stats[2], choice.stats[3], choice.stats[4]);
  /* 플래그 처리 */
  if (choice.flag) choice.flag();

  /* 선택지 숨기기 */
  var wrap = document.getElementById('choices-wrap');
  wrap.classList.add('hidden');

  /* 결과 텍스트 타이핑 */
  if (choice.result && choice.result.length > 0) {
    typeAppend('\n' + choice.result, function() {
      /* 다음 씬으로 */
      nextTarget = choice.next;
      document.getElementById('next-hint').classList.add('visible');
      waitingForNext = true;
    });
  } else {
    /* 결과 없으면 바로 다음 */
    goToNext(choice.next);
  }
}


/* ════════════════════════════════════════════════════
   타이핑 엔진
════════════════════════════════════════════════════ */
function startTyping(lines, onDone) {
  if (typingTimer) clearTimeout(typingTimer);

  var container = document.getElementById('script-text');
  container.innerHTML = '';

  /* 커서 생성 */
  var cursor = document.createElement('span');
  cursor.id = 'typing-cursor';
  cursor.style.cssText = 'display:inline-block;width:2px;height:0.9em;background:#7a6340;vertical-align:middle;margin-left:1px;animation:blink 0.7s step-end infinite;';
  container.appendChild(cursor);

  var fullText = lines.join('\n');
  var i = 0;
  var speed = getTypeSpeed();

  /* 클릭 스킵 (한 번만, 한 틱 늦게 등록) */
  function skipHandler() {
    if (typingTimer) clearTimeout(typingTimer);
    finishNow();
  }
  setTimeout(function() {
    document.body.addEventListener('click', skipHandler, { once: true });
  }, 0);

  function tick() {
    if (i < fullText.length) {
      var ch = fullText[i];
      if (ch === '\n') {
        container.insertBefore(document.createElement('br'), cursor);
      } else {
        var prev = cursor.previousSibling;
        if (prev && prev.nodeType === 3) {
          prev.textContent += ch;
        } else {
          container.insertBefore(document.createTextNode(ch), cursor);
        }
      }
      i++;
      var delay = ch === '.' ? 400 : speed;
      typingTimer = setTimeout(tick, delay);
    } else {
      cursor.style.display = 'none';
      if (onDone) onDone();
    }
  }

  function finishNow() {
    if (typingTimer) clearTimeout(typingTimer);
    container.innerHTML = '';
    lines.forEach(function(line, idx) {
      container.appendChild(document.createTextNode(line));
      if (idx < lines.length - 1) container.appendChild(document.createElement('br'));
    });
    cursor = document.createElement('span');
    cursor.style.display = 'none';
    container.appendChild(cursor);
    if (onDone) onDone();
  }

  tick();
}

/* 기존 텍스트 뒤에 이어 타이핑 */
function typeAppend(text, onDone) {
  var container = document.getElementById('script-text');

  /* 커서 추가 */
  var cursor = document.createElement('span');
  cursor.style.cssText = 'display:inline-block;width:2px;height:0.9em;background:#7a6340;vertical-align:middle;margin-left:1px;animation:blink 0.7s step-end infinite;';
  container.appendChild(cursor);

  var i = 0;
  var speed = getTypeSpeed();
  var appendTimer = null;
  var done = false;

  /* 클릭하면 즉시 전체 출력 (한 번만)
     - setTimeout으로 한 틱 늦게 등록: 선택지를 클릭한 바로 그 클릭이
       버블링되어 곧바로 skipHandler를 실행시켜버리는 것을 방지 */
  function skipHandler() {
    if (done) return;
    if (appendTimer) clearTimeout(appendTimer);
    finishNow();
  }
  setTimeout(function() {
    document.body.addEventListener('click', skipHandler, { once: true });
  }, 0);

  function finishNow() {
    done = true;
    while (i < text.length) {
      var ch = text[i];
      if (ch === '\n') {
        container.insertBefore(document.createElement('br'), cursor);
      } else {
        var prev = cursor.previousSibling;
        if (prev && prev.nodeType === 3) {
          prev.textContent += ch;
        } else {
          container.insertBefore(document.createTextNode(ch), cursor);
        }
      }
      i++;
    }
    cursor.style.display = 'none';
    if (onDone) onDone();
  }

  function tick() {
    if (done) return;
    if (i < text.length) {
      var ch = text[i];
      if (ch === '\n') {
        container.insertBefore(document.createElement('br'), cursor);
      } else {
        var prev = cursor.previousSibling;
        if (prev && prev.nodeType === 3) {
          prev.textContent += ch;
        } else {
          container.insertBefore(document.createTextNode(ch), cursor);
        }
      }
      i++;
      appendTimer = setTimeout(tick, speed);
    } else {
      done = true;
      cursor.style.display = 'none';
      if (onDone) onDone();
    }
  }
  tick();
}


/* ════════════════════════════════════════════════════
   씬 전환: 텍스트 영역만 페이드 (검은 화면 없음)
════════════════════════════════════════════════════ */
function doSceneTransition(sceneId) {
  var scriptArea  = document.getElementById('script-area');
  var choicesWrap = document.getElementById('choices-wrap');

  /* 1. 텍스트+선택지 fade out */
  scriptArea.classList.add('scene-out');
  choicesWrap.classList.add('scene-out');

  setTimeout(function() {
    /* 2. 씬 로드 */
    loadScene(sceneId);

    /* 3. 새 텍스트 fade in */
    scriptArea.classList.remove('scene-out');
    scriptArea.classList.add('scene-in');
    /* reveal 클래스가 이미 있으면 잠깐 떼었다 붙여야 transition이 발동 */
    scriptArea.classList.remove('reveal');
    void scriptArea.offsetWidth; /* reflow 강제 */
    scriptArea.classList.add('reveal');

    setTimeout(function() {
      scriptArea.classList.remove('scene-in');
      choicesWrap.classList.remove('scene-out');
    }, 600);
  }, 300);
}

/* 엔딩 전환: 검은 화면 → 엔딩 표시 */
function doEndingTransition(callback) {
  var ov = document.getElementById('ending-transition');
  ov.classList.add('fade-in');
  setTimeout(function() {
    callback();
    setTimeout(function() {
      ov.classList.remove('fade-in');
    }, 400);
  }, 650);
}

/* 화면 클릭 → 다음 씬 */
document.body.addEventListener('click', function() {
  if (!waitingForNext || !nextTarget) return;
  waitingForNext = false;
  document.getElementById('next-hint').classList.remove('visible');
  goToNext(nextTarget);
});


/* ════════════════════════════════════════════════════
   엔딩 화면 표시
════════════════════════════════════════════════════ */
var currentEndingNum = null;
var isFirstAchiever  = false;

function triggerEnding(num) {
  endingReached = true;
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  window.onbeforeunload = null;
  currentEndingNum = num;

  /* 검은 화면 전환 후 엔딩 표시 */
  doEndingTransition(function() {
    var data = ENDINGS[num];
    if (!data) return;

    /* 게임 씬 숨기기 */
    document.getElementById('scene').style.display = 'none';

    /* 엔딩 정보 채우기 */
    document.getElementById('ending-number-label').textContent = data.label;
    document.getElementById('ending-arch-img').src = 'images/' + data.archImg;
    document.getElementById('ending-illust-img').src = 'images/' + data.illustImg;

    /* 본문 단락 */
    var contentEl = document.getElementById('ending-text-content');
    contentEl.innerHTML = '';
    data.paragraphs.forEach(function(para) {
      var p = document.createElement('p');
      p.className = 'ending-text-paragraph';
      p.innerHTML = para.replace(/\n/g, '<br>');
      contentEl.appendChild(p);
    });

    /* 엔딩 화면 표시 */
    var endingScreen = document.getElementById('ending-screen');
    endingScreen.classList.add('active');
    endingScreen.scrollTop = 0;

    /* 제목은 일단 기본 이름으로 표시 (DB 확인 후 최초/비최초에 따라 갱신됨) */
    document.getElementById('ending-title-text').textContent = data.title;

    /* DB 확인 + 등록 시도 */
    resolveEndingAchievement(num, data);
  });
}

/* ════════════════════════════════════════════════════
   최초 달성자 판단 + endings 테이블 등록 시도
   - ending_number에 unique 제약이 걸려있으므로,
     insert 성공 = 최초 달성, 실패(중복) = 이미 누군가 달성함
════════════════════════════════════════════════════ */
async function resolveEndingAchievement(num, data) {
  var nickname = sessionStorage.getItem('playerName') || '플레이어';

  try {
    var { error } = await db.from('endings').insert({
      ending_number: num,
      lineage_id: LINEAGE_ID,
      custom_name: data.title,
      player_nickname: nickname
    });

    if (!error) {
      /* ── 최초 달성자 ── */
      isFirstAchiever = true;
      document.getElementById('ending-name-wrap-first').style.display = 'flex';
      document.getElementById('ending-complete-wrap-normal').style.display = 'none';

      var input = document.getElementById('ending-name-input');
      input.value = data.title;
    } else {
      /* ── 이미 누군가 달성함 (비최초) ── */
      isFirstAchiever = false;
      document.getElementById('ending-name-wrap-first').style.display = 'none';
      document.getElementById('ending-complete-wrap-normal').style.display = 'flex';

      var { data: existing } = await db
        .from('endings')
        .select('custom_name')
        .eq('ending_number', num)
        .single();

      var endingName = (existing && existing.custom_name) ? existing.custom_name : data.title;
      document.getElementById('ending-title-text').textContent = endingName;

      document.getElementById('ending-normal-notice').innerHTML =
        '이렇게 <em style="font-style:normal; color:#7a5a18; font-weight:700;">' + endingName + '</em>의 이야기는 결말을 맺어졌습니다.<br>' +
        '완료 버튼을 눌러 이야기 선택창으로 돌아가 새로운 결말을 찾아보세요.';
    }
  } catch (err) {
    console.error('엔딩 기록 처리 실패:', err);
    isFirstAchiever = false;
    document.getElementById('ending-name-wrap-first').style.display = 'none';
    document.getElementById('ending-complete-wrap-normal').style.display = 'flex';
  }
}

/* ════════════════════════════════════════════════════
   "완료" / "이야기 완료하기" 버튼
════════════════════════════════════════════════════ */
async function completeEnding() {
  var btn = isFirstAchiever
    ? document.getElementById('btn-ending-complete-first')
    : document.getElementById('btn-ending-complete-normal');

  btn.disabled = true;
  btn.innerHTML = '✦ &nbsp;이동 중...&nbsp; ✦';

  try {
    if (isFirstAchiever) {
      var input = document.getElementById('ending-name-input');
      var customName = input.value.trim();
      if (!customName) customName = ENDINGS[currentEndingNum].title;

      await db.from('endings')
        .update({ custom_name: customName })
        .eq('ending_number', currentEndingNum);
    }

    /* 달성률 계산용 로그 기록 (몇 번째 발견이든 매번 한 줄씩 추가) */
    await db.from('ending_logs').insert({ ending_number: currentEndingNum });

    if (ROOM_ID) {
      await db.from('rooms').delete().eq('id', ROOM_ID);
    }
  } catch (err) {
    console.error('엔딩 완료 처리 실패:', err);
  }

  sessionStorage.setItem('justUnlockedEnding', String(currentEndingNum));
  sessionStorage.setItem('justUnlockedIsFirst', isFirstAchiever ? '1' : '0');

  location.href = 'archive.html';
}


</script>
