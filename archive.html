<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio Path - 엔딩 서재</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
@font-face {
    font-family: 'Aritaburi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Arita-buri-SemiBold.woff') format('woff');
    font-weight: normal;
    font-display: swap;
}
  </style>
  <style>

    /* ══════════════════════════════
       기본 설정
    ══════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #e8dfc8;
      font-family: 'Nanum Myeongjo', serif;
      position: relative;
    }

    /* ══════════════════════════════
       배경 레이어 (library.html과 동일)
    ══════════════════════════════ */
    #bg-parchment {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #bg-illust {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 4;   /* scene(3)보다 위 → 카드가 배경 아래로 */
      pointer-events: none;
    }

    /* ══════════════════════════════
       전체 씬 컨테이너
    ══════════════════════════════ */
    #scene {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 3;
    }

    /* ══════════════════════════════
       타이틀 이미지 (엔딩 서재)
    ══════════════════════════════ */
    #archive-title {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      width: 24%;
      pointer-events: none;
      animation: fadeDown 0.8s ease-out both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ══════════════════════════════
       메인 콘텐츠 영역
    ══════════════════════════════ */
    #main-section {
      position: absolute;
      left: 50%;
      top: 23%;
      transform: translateX(-50%);
      width: 60%;
      max-height: 78vh;
      padding-bottom: 10%;          /* 화면을 넘어가면 스크롤 */
      overflow-y: auto;
      animation: fadeUp 0.9s ease-out 0.2s both;
        scrollbar-width: none;        /* 파이어폭스용 */
  -ms-overflow-style: none;     /* IE용 */
    }

    #main-section::-webkit-scrollbar {
  display: none;                /* 크롬/사파리용 */
}

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(24px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ══════════════════════════════
       스토리 제목 + 달성 배지
    ══════════════════════════════ */
    #story-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2%;
    }

    #story-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: clamp(0.85rem, 1.3vw, 1.1rem);
      color: #3a2a00;
      font-weight: 700;
    }

    #achievement-badge {
      font-family: 'Aritaburi', sans-serif;
      font-size: clamp(0.55rem, 0.85vw, 0.72rem);
      color: #8a6914;
      background: rgba(200, 168, 100, 0.18);
      border: 1px solid #c8a86a;
      border-radius: 20px;
      padding: 3px 12px;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════
       엔딩카드 그리드 (4열)
    ══════════════════════════════ */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5%;
    }

    /* ── 카드 공통: 이미지 위에 텍스트 오버레이 구조 ── */
    .ending-card {
      position: relative;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .ending-card:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
    }

    /* 카드 이미지 */
    .card-img-wrap {
      width: 100%;
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      display: block;
    }

    /* ── 공개 카드: 이미지 위에 텍스트 오버레이 ── */
    .card-info {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10% 8%;
      pointer-events: none;
    }

    .card-top {
  display: flex;
  flex-direction: column;
  gap: 3px;           /* num과 title 사이 간격, 조절 가능 */
  align-items: center; /* 중앙정렬 유지 */
}

    .card-ending-num {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.8rem;        /* rem: 화면 크기와 무관하게 고정 */
      letter-spacing: 0.2em;
      color: #9a8060;
        text-align: center;
    }

    .card-ending-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.1rem;
      color: #2a1e08;
      font-weight: 700;
      line-height: 1.3;
        text-align: center;
    }

    .card-bottom {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 0 0 0 4%;
    }

    .card-achieve-rate {
      font-size: 1.8rem;
      color: #8a6914;
      font-weight: 800;
    }

    .card-achieve-label {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.7rem;
      color: #9a8060;
      font-weight: 400;
    }

    /* ── 잠긴 카드 ── */
    .ending-card.locked {
      cursor: default;
      pointer-events: none;
    }

    .ending-card.locked .card-img-wrap {
      opacity: 0.85;
    }

    /* 잠긴 카드 텍스트 오버레이 */
    .card-locked-info {
      position: absolute;
      bottom: 12%;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    .card-locked-num {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #b0a088;
    }

    /* ══════════════════════════════
       발견 애니메이션 (최초 달성 시)
       - 카드가 빛나며 뒤집히는 효과
    ══════════════════════════════ */
    .ending-card.discovering {
      animation: cardGlowPulse 1.4s ease-in-out;
      z-index: 5;
    }

    .ending-card.discovering .card-img-wrap {
      animation: cardFlip 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    @keyframes cardGlowPulse {
      0%   { filter: drop-shadow(0 0 0px rgba(255, 230, 150, 0)); }
      35%  { filter: drop-shadow(0 0 24px rgba(255, 220, 130, 0.95)); }
      70%  { filter: drop-shadow(0 0 24px rgba(255, 220, 130, 0.95)); }
      100% { filter: drop-shadow(0 0 0px rgba(255, 230, 150, 0)); }
    }

    @keyframes cardFlip {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(90deg); }
      51%  { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }

    /* 살짝 강조 스크롤 타겟 표시 */
    .ending-card.just-found {
      animation: cardHighlight 1.6s ease-out;
    }
    @keyframes cardHighlight {
      0%   { transform: translateY(-4px) scale(1.04); }
      60%  { transform: translateY(-4px) scale(1.04); }
      100% { transform: translateY(0) scale(1); }
    }

    /* ══════════════════════════════
       표지판 (library.html과 동일)
    ══════════════════════════════ */
    #signpost-group {
      position: absolute;
      z-index: 10;
      right: 7%;
      bottom: 2%;
      width: 18%;
      height: auto;
      transform-origin: bottom center;

    }

    #sign-post-img {
      width: 100%;
      height: auto;
      display: block;
            z-index: 100;
    }

    #sign-buttons {
      position: absolute;
      top: 8%;
      left: 20%;
      width: 75%;
      display: flex;
      flex-direction: column;
      gap: 2%;
    }

    .sign-btn {
      width: 85%;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .sign-btn:hover {
      transform: scale(1.05) translateX(-4px);
      filter: brightness(1.1);
    }

    .sign-btn:active { transform: scale(0.97); }
    .sign-btn img { width: 100%; height: auto; display: block; }

    /* ══════════════════════════════
       모바일 반응형
    ══════════════════════════════ */
    @media (max-width: 768px) {
      #archive-title { width: 70%; top: 3%; }

      #main-section {
        width: 90%;
        top: 18%;
        overflow-y: auto;
        max-height: 78vh;
        
      }

      #cards-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 3%;
      }

      #signpost-group {
        width: 28%;
        right: 1%;
        bottom: 8%;
      }
    }

    @media (max-width: 480px) {
      #cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 4%;
      }
    }

    /* ══════════════════════════════
       도움말 / 설정 오버레이
    ══════════════════════════════ */
    .overlay-panel {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .overlay-box {
      background: #f5ead0;
      border: 3px solid #8b6914;
      border-radius: 12px;
      padding: 40px;
      min-width: 300px;
      text-align: center;
      font-family: 'Nanum Myeongjo', serif;
      color: #3a2a00;
      position: relative;
    }

    .overlay-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #8b6914;
    }

    .overlay-box h2 { margin-bottom: 16px; }

    /* ══════════════════════════════
       엔딩 상세 오버레이
    ══════════════════════════════ */
    #ending-detail-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    #ending-detail-overlay.active { display: flex; }

    #ending-detail-box {
      position: relative;
      background: #f2ead6;
      border: 1px solid #c8a86a;
      border-radius: 4px;
      width: min(520px, 88vw);
      max-height: 90vh;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 44px 48px 40px;
      animation: popIn 0.32s cubic-bezier(0.34,1.4,0.64,1) both;
    }

    #ending-detail-box::-webkit-scrollbar { display: none; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    #detail-close {
      position: absolute;
      top: 14px; right: 20px;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #8a6e40;
      cursor: pointer;
      transition: color 0.15s;
    }
    #detail-close:hover { color: #2a1800; }

    /* 상단: 번호 + 제목 + 초록이미지 */
    #detail-header { text-align: center; margin-bottom: 16px; }

    #detail-ending-num {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #9a8060;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    #detail-ending-num::before,
    #detail-ending-num::after { content: '✦'; font-size: 0.6rem; color: #c8a86a; }

    #detail-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.6rem;
      color: #2a1e08;
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* 초록 이미지 */
    #detail-deco-img { width: 100%; display: block; margin: 0 auto 16px; }

    /* 구분선 
    .detail-divider {
      width: 100%;
      height: 1px;
      background: rgba(150,120,70,0.3);
      margin: 14px 0;
    } */

    /* 통계 박스 */
    #detail-stats {
      display: flex;
      border: 1px solid rgba(150,120,70,0.3);
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .stat-cell {
      flex: 1;
      padding: 14px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-cell:first-child { border-right: 1px solid rgba(150,120,70,0.3); }

    .stat-value {
      font-size: 1.8rem;
      color: #8a6914;
      font-weight: 800;
    }
    .stat-label {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.65rem;
      color: #9a8060;
    }
    .star-rating { font-size: 1.5rem; letter-spacing: 2px; color: #c8a040; }

    /* 섹션 공통 */
    .detail-section { margin-bottom: 18px; }

    .detail-section-label {
      font-family: 'Aritaburi', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: #9a8060;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
    }
    .detail-section-label::before,
    .detail-section-label::after { content: '✦'; font-size: 0.5rem; color: #c8a86a; }

    .detail-section-body {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.88rem;
      color: #3a2800;
      line-height: 1.9;
    }

    /* FIRST ACHIEVER */
    #detail-first-achiever {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 6px;
    }

    /* 빨간 이미지 */
    #detail-player-img {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    #detail-player-info { display: flex; flex-direction: column; gap: 3px; }

    #detail-player-name {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      color: #2a1e08;
      font-weight: 700;
    }
    #detail-player-date {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 0.65rem;
      color: #9a8060;
      font-style: italic;
    }

  </style>
</head>
<body>


<!-- 배경음 -->
<audio id="bgm" src="sound/back.mp3" loop preload="auto"></audio>
<!-- 클릭음 -->
<audio id="sfx-click" src="sound/mouse.mp3" preload="auto"></audio>
<!-- 배경 (library.html과 동일) -->
<img id="bg-parchment" src="images/bg_parchment.png" alt="양피지 배경" />
<img id="bg-illust" src="images/bg_illust2.png" alt="배경" />

<div id="scene">

  <!-- 타이틀 이미지 -->
  <img id="archive-title" src="images/archive_title.png" alt="엔딩 서재" />

  <!-- ══ 메인 콘텐츠 ══ -->
  <div id="main-section">

    <!-- 스토리 제목 + 달성 현황 -->
    <div id="story-header">
      <span id="story-title">인어공주</span>
      <span id="achievement-badge">19 / 20 달성</span>
    </div>

    <!-- 엔딩카드 그리드 (JS가 동적으로 채움) -->
    <div id="cards-grid"></div><!-- /cards-grid -->
  </div><!-- /main-section -->

  <!-- ══ 표지판 ══ -->
  <div id="signpost-group">
    <img id="sign-post-img" src="images/sign_post.png" alt="표지판 거치대" />
    <div id="sign-buttons">
      <button class="sign-btn" onclick="location.href='index.html'">
        <img src="images/sign_home.png" alt="홈으로" />
      </button>
      <button class="sign-btn" onclick="openOverlay('overlay-help')">
        <img src="images/sign_help.png" alt="도움말" />
      </button>
      <button class="sign-btn" onclick="location.href='library.html'">
        <img src="images/sign_library.png" alt="서재로" />
      </button>
      <button class="sign-btn" onclick="openOverlay('overlay-setting')">
        <img src="images/sign_setting.png" alt="설정" />
      </button>
    </div>
  </div>

</div><!-- /scene -->


<!-- 도움말 오버레이 -->
<div id="overlay-help" class="overlay-panel">
  <div class="overlay-box">
    <button class="overlay-close" onclick="closeOverlay('overlay-help')">✕</button>
    <h2>도움말</h2>
    <p>여기에 도움말 내용을 넣어줘!</p>
  </div>
</div>

<!-- 설정 오버레이 (공통 설정 UI) -->
<div id="overlay-setting" class="overlay-panel">
  <div class="overlay-box" style="max-width: 420px; width: 90%; text-align: left;">
    <button class="overlay-close" onclick="closeOverlay('overlay-setting')">✕</button>
    <h2>설정</h2>

    <!-- 배경음 크기 -->
    <div style="margin-bottom: 22px;">
      <label style="display:flex; justify-content:space-between; font-size:0.88rem; margin-bottom:8px;">
        <span>배경음 크기</span>
        <span id="setting-bgm-volume-label">35%</span>
      </label>
      <input type="range" id="setting-bgm-volume" min="0" max="100" step="5"
             value="35" style="width:100%;"
             oninput="onBgmVolumeChange(this.value)" />
    </div>

    <!-- 클릭음 on/off -->
    <div style="margin-bottom: 22px; display:flex; align-items:center; justify-content:space-between;">
      <label for="setting-click-toggle" style="font-size:0.88rem;">마우스 클릭음</label>
      <input type="checkbox" id="setting-click-toggle" checked
             style="width:20px; height:20px; cursor:pointer;"
             onchange="onClickToggleChange(this.checked)" />
    </div>

    <!-- 텍스트 출력 속도 -->
    <div>
      <label style="display:block; font-size:0.88rem; margin-bottom:10px;">텍스트 출력 속도</label>
      <div style="display:flex; gap:14px; font-size:0.85rem;">
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
          <input type="radio" name="setting-text-speed" value="slow"
                 onchange="onTextSpeedChange(this.value)" /> 느리게
        </label>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
          <input type="radio" name="setting-text-speed" value="normal" checked
                 onchange="onTextSpeedChange(this.value)" /> 보통
        </label>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
          <input type="radio" name="setting-text-speed" value="fast"
                 onchange="onTextSpeedChange(this.value)" /> 빠르게
        </label>
      </div>
    </div>

  </div>
</div>

<!-- ══ 엔딩 상세 오버레이 ══ -->
<div id="ending-detail-overlay">
  <div id="ending-detail-box">

    <!-- X 닫기 -->
    <button id="detail-close" onclick="closeEndingDetail()">✕</button>

    <!-- 상단: 번호 + 제목 + 초록 이미지 -->
    <div id="detail-header">
      <div id="detail-ending-num">ENDING 01</div>
      <div id="detail-title">거품이 된 목소리</div>
      <img id="detail-deco-img" src="images/arch_ed1.png" alt="엔딩 장식 이미지" />
    </div>

    <div class="detail-divider"></div>

    <!-- 통계: 달성률 + 희귀도 -->
    <div id="detail-stats">
      <div class="stat-cell">
        <span class="stat-value">33%</span>
        <span class="stat-label">달성률</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value star-rating">★★☆☆☆</span>
        <span class="stat-label">희귀도</span>
      </div>
    </div>

    <!-- ENDING SUMMARY -->
    <div class="detail-section">
      <div class="detail-section-label">ENDING SUMMARY</div>
      <p class="detail-section-body">
        인어공주는 결국 거품이 되어 사라졌습니다.<br>
        그러나 파도 소리 속에 그녀의 목소리가 영원히 남았습니다.
      </p>
    </div>

    <!-- UNLOCK CONDITION -->
    <div class="detail-section">

/* ── 설정값 불러오기 (없으면 기본값) ── */
function getSetting(key, def) {
  var v = localStorage.getItem(key);
  return (v === null) ? def : v;
}

var SETTINGS = {
  bgmVolume: parseInt(getSetting('folio_bgmVolume', '35'), 10),   // 0~100
  clickEnabled: getSetting('folio_clickEnabled', 'on') === 'on',  // on/off
  textSpeed: getSetting('folio_textSpeed', 'normal'),             // slow/normal/fast
};

/* 텍스트 출력 속도 → 1글자당 ms (typeAppend 등에서 사용) */
var TEXT_SPEED_MS = { slow: 65, normal: 40, fast: 18 };
function getTypeSpeed() {
  return TEXT_SPEED_MS[SETTINGS.textSpeed] || TEXT_SPEED_MS.normal;
}

/* ── 사운드 엘리먼트 ── */
var bgm      = document.getElementById('bgm');
var sfxClick = document.getElementById('sfx-click');
var bgmStarted = false;

/* 배경음 시작 + 이어듣기 위치 복원 */
function startBgm() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.volume = SETTINGS.bgmVolume / 100;

  var savedTime = parseFloat(sessionStorage.getItem('folio_bgmTime') || '0');
  if (savedTime > 0 && isFinite(savedTime)) {
    bgm.currentTime = savedTime;
  }
  bgm.play().catch(function(){});
}

/* 클릭음 재생 (설정에서 꺼져있으면 재생 안 함) */
function playClick() {
  if (!SETTINGS.clickEnabled) return;
  sfxClick.currentTime = 0;
  sfxClick.play().catch(function(){});
}

/* 첫 클릭 시 배경음 시작 + 매 클릭마다 클릭음 재생 */
document.addEventListener('click', function() {
  startBgm();
  playClick();
}, true);

/* 1초마다 배경음 재생 위치를 저장 (다음 페이지에서 이어 듣기 위함) */
setInterval(function() {
  if (bgm && !bgm.paused) {
    sessionStorage.setItem('folio_bgmTime', String(bgm.currentTime));
  }
}, 1000);

/* 페이지를 벗어나기 직전에도 한 번 더 저장 */
window.addEventListener('pagehide', function() {
  if (bgm) {
    sessionStorage.setItem('folio_bgmTime', String(bgm.currentTime));
  }
});


/* ════════════════════════════════════════════════════
   설정 오버레이 — 공통 UI
════════════════════════════════════════════════════ */
function openOverlay(id) {
  var el = document.getElementById(id);
  el.classList.add('active');
  el.style.display = 'flex';

  if (id === 'overlay-setting') {
    syncSettingUI();
  }
}

function closeOverlay(id) {
  var el = document.getElementById(id);
  el.classList.remove('active');
  el.style.display = 'none';
}

/* 오버레이 바깥 클릭하면 닫히게 (.overlay, .overlay-panel 둘 다 지원) */
document.querySelectorAll('.overlay, .overlay-panel').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      closeOverlay(overlay.id);
    }
  });
});

/* 설정창 UI를 현재 SETTINGS 값으로 동기화 */
function syncSettingUI() {
  var volSlider = document.getElementById('setting-bgm-volume');
  var volLabel  = document.getElementById('setting-bgm-volume-label');
  var clickToggle = document.getElementById('setting-click-toggle');
  var speedRadios = document.querySelectorAll('input[name="setting-text-speed"]');

  if (volSlider) {
    volSlider.value = SETTINGS.bgmVolume;
    if (volLabel) volLabel.textContent = SETTINGS.bgmVolume + '%';
  }
  if (clickToggle) {
    clickToggle.checked = SETTINGS.clickEnabled;
  }
  speedRadios.forEach(function(radio) {
    radio.checked = (radio.value === SETTINGS.textSpeed);
  });
}

/* 배경음 크기 변경 */
function onBgmVolumeChange(value) {
  SETTINGS.bgmVolume = parseInt(value, 10);
  localStorage.setItem('folio_bgmVolume', String(SETTINGS.bgmVolume));
  bgm.volume = SETTINGS.bgmVolume / 100;
  var volLabel = document.getElementById('setting-bgm-volume-label');
  if (volLabel) volLabel.textContent = SETTINGS.bgmVolume + '%';
}

/* 클릭음 on/off 변경 */
function onClickToggleChange(checked) {
  SETTINGS.clickEnabled = checked;
  localStorage.setItem('folio_clickEnabled', checked ? 'on' : 'off');
}

/* 텍스트 속도 변경 */
function onTextSpeedChange(value) {
  SETTINGS.textSpeed = value;
  localStorage.setItem('folio_textSpeed', value);
}

    unlock: '모든 파트에서 원형과 통찰 수치의 합이 가장 높은 상태로 마지막까지 진행하면 달성됩니다.',
    player: '영원의항해자', date: '2025.12.24 00:00'
  },
};

/* ──────────────────────────────────────
   카드 그리드 동적 렌더링
   - endings 테이블: 엔딩별 1행 (최초 달성자 정보)
   - ending_logs 테이블: 매 발견마다 1행 (달성률 계산용)
────────────────────────────────────── */
var TOTAL_ENDINGS = 20;
var endingsMap = {};   // { ending_number: {custom_name, player_nickname, created_at} }
var rateMap = {};      // { ending_number: 33 } (정수 퍼센트)

/* 별점: 달성률이 낮을수록(희귀할수록) 별이 많아짐 */
function rateToStars(rate) {
  if (rate <= 3)  return '★★★★★';
  if (rate <= 6)  return '★★★★☆';
  if (rate <= 12) return '★★★☆☆';
  if (rate <= 25) return '★★☆☆☆';
  return '★☆☆☆☆';
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var pad = function(n){ return String(n).padStart(2,'0'); };
  return d.getFullYear() + '.' + pad(d.getMonth()+1) + '.' + pad(d.getDate()) +
         ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

async function loadAndRenderCards() {
  var grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  /* 1. endings 테이블 (최초 달성자 정보) 조회 */
  try {
    var { data: endingsRows } = await db.from('endings').select('*');
    (endingsRows || []).forEach(function(row) {
      endingsMap[row.ending_number] = row;
    });
  } catch (err) {
    console.error('endings 조회 실패:', err);
  }

  /* 2. ending_logs 테이블 (달성률 계산용) 조회 */
  try {
    var { data: logRows } = await db.from('ending_logs').select('ending_number');
    var total = (logRows || []).length;
    var counts = {};
    (logRows || []).forEach(function(r) {
      counts[r.ending_number] = (counts[r.ending_number] || 0) + 1;
    });
    if (total > 0) {
      Object.keys(counts).forEach(function(num) {
        rateMap[num] = Math.round(counts[num] / total * 100);
      });
    }
  } catch (err) {
    console.error('ending_logs 조회 실패:', err);
  }

  /* 3. 카드 렌더링 (1~20번) */
  var discoveredCount = 0;
  for (var i = 1; i <= TOTAL_ENDINGS; i++) {
    var found = endingsMap[i];
    var card = document.createElement('div');
    card.id = 'ending-card-' + i;
    var numStr = String(i).padStart(2, '0');

    if (found) {
      discoveredCount++;
      var rate = (rateMap[i] !== undefined) ? rateMap[i] : 0;
      var data = ENDING_DATA[i] || {};
      var title = found.custom_name || data.title || ('엔딩 ' + numStr);

      card.className = 'ending-card unlocked';
      card.setAttribute('onclick', 'openEndingDetail(' + i + ')');
      card.innerHTML =
        '<div class="card-img-wrap">' +
          '<img src="images/ending_card_' + numStr + '.png" alt="엔딩 ' + numStr + '" />' +
          '<div class="card-info">' +
            '<div class="card-top">' +
              '<span class="card-ending-num">ENDING ' + numStr + '</span>' +
              '<span class="card-ending-title">' + title + '</span>' +
            '</div>' +
            '<div class="card-bottom">' +
              '<span class="card-achieve-rate">' + rate + '%</span>' +
              '<span class="card-achieve-label">달성률</span>' +
            '</div>' +
          '</div>' +
        '</div>';
    } else {
      card.className = 'ending-card locked';
      card.innerHTML =
        '<div class="card-img-wrap">' +
          '<img src="images/ending_card_locked.png" alt="잠긴 엔딩" />' +
          '<div class="card-locked-info"><span class="card-locked-num">ENDING ' + numStr + '</span></div>' +
        '</div>';
    }

    grid.appendChild(card);
  }

  /* 달성 배지 갱신 */
  document.getElementById('achievement-badge').textContent =
    discoveredCount + ' / ' + TOTAL_ENDINGS + ' 달성';

  /* 4. 방금 발견한 엔딩이 있으면 발견 연출 실행 */
  handleJustUnlocked();
}

/* ──────────────────────────────────────
   방금 발견한 엔딩 처리
   - 해당 카드로 스크롤
   - 최초 달성자면: 빛나며 뒤집히는 애니메이션
   - 비최초면: 살짝 강조만
   - 애니메이션 후 상세 오버레이 자동 오픈
────────────────────────────────────── */
function handleJustUnlocked() {
  var num = sessionStorage.getItem('justUnlockedEnding');
  var isFirst = sessionStorage.getItem('justUnlockedIsFirst') === '1';

  if (!num) return;

  /* 한 번 처리하면 다시 안 뜨도록 즉시 제거 */
  sessionStorage.removeItem('justUnlockedEnding');
  sessionStorage.removeItem('justUnlockedIsFirst');

  var card = document.getElementById('ending-card-' + num);
  if (!card) return;

  /* 카드 위치로 스크롤 */
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });

  setTimeout(function() {
    if (isFirst) {
      card.classList.add('discovering');
      card.addEventListener('animationend', function onEnd() {
        card.removeEventListener('animationend', onEnd);
        card.classList.remove('discovering');
        openEndingDetail(parseInt(num, 10));
      }, { once: true });
    } else {
      card.classList.add('just-found');
      card.addEventListener('animationend', function onEnd() {
        card.removeEventListener('animationend', onEnd);
        card.classList.remove('just-found');
        openEndingDetail(parseInt(num, 10));
      }, { once: true });
    }
  }, 500); /* 스크롤 끝나길 잠시 기다림 */
}

/* ──────────────────────────────────────
   엔딩 상세 오버레이
────────────────────────────────────── */
function openEndingDetail(num) {
  var d = ENDING_DATA[num] || {};
  var found = endingsMap[num];
  var numStr = String(num).padStart(2, '0');
  var rate = (rateMap[num] !== undefined) ? rateMap[num] : 0;
  var title = (found && found.custom_name) ? found.custom_name : (d.title || ('엔딩 ' + numStr));

  document.getElementById('detail-ending-num').textContent = 'ENDING ' + numStr;
  document.getElementById('detail-title').textContent      = title;

  /* 통계: 실제 달성률 + 희귀도(달성률 기반) */
  document.querySelector('#detail-stats .stat-cell:first-child .stat-value').textContent = rate + '%';
  document.querySelector('.star-rating').textContent = rateToStars(rate);

  /* 섹션 본문 (요약/해금조건은 시트 데이터 그대로 사용) */
  var sections = document.querySelectorAll('.detail-section-body');
  sections[0].innerHTML = d.summary || '';
  sections[1].innerHTML = d.unlock || '';

  /* 최초 달성자: 실제 DB 값 */
  if (found) {
    document.getElementById('detail-player-name').textContent = found.player_nickname || '알 수 없음';
    document.getElementById('detail-player-date').textContent = '최초 달성일\u00a0 ' + formatDate(found.created_at);
  } else {
    document.getElementById('detail-player-name').textContent = '-';
    document.getElementById('detail-player-date').textContent = '';
  }

  document.getElementById('ending-detail-overlay').classList.add('active');
}

function closeEndingDetail() {
  document.getElementById('ending-detail-overlay').classList.remove('active');
}

document.getElementById('ending-detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeEndingDetail();
});

/* ──────────────────────────────────────
   초기 실행
────────────────────────────────────── */
loadAndRenderCards();
</script>

</body>
</html>
